name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24's bundled npm (>= 11.11) already supports OIDC trusted publishing (needs
          # >= 11.5.1). We deliberately do NOT `npm install -g npm@latest`: self-updating npm in
          # the setup-node toolcache strips its own bundled deps (it logs "removed 71 packages"),
          # which drops `sigstore` and breaks `--provenance` with "Cannot find module 'sigstore'".
          # The node-bundled npm is a complete install, so provenance works out of the box.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          # Use npm publish directly so OIDC env vars reach the npm CLI reliably.
          publish: npm publish --access public
          version: pnpm version-packages
        env:
          # Tokenless: trusted publisher configured on npm for this repo/workflow.
          # With no NPM_TOKEN and id-token: write, changesets/action publishes via
          # OIDC trusted publishing; provenance is then generated automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
