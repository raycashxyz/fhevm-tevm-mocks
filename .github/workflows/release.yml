name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24's bundled npm (>= 11.11) already supports OIDC trusted publishing (needs
          # >= 11.5.1). We deliberately do NOT `npm install -g npm@latest`: self-updating npm in
          # the setup-node toolcache strips its own bundled deps (it logs "removed 71 packages"),
          # which drops `sigstore` and breaks `--provenance` with "Cannot find module 'sigstore'".
          # The node-bundled npm is a complete install, so provenance works out of the box.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Prepare npm for OIDC trusted publishing
        run: |
          # setup-node writes a placeholder _authToken when registry-url is set; strip it so npm
          # falls back to GitHub OIDC trusted publishing instead of an empty token.
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/^\/\/registry\.npmjs\.org\/:_authToken=/d' "$HOME/.npmrc"
          fi
      - uses: changesets/action@v1
        with:
          publish: npm publish --access public
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
      - name: Verify npm publish
        if: failure()
        run: npm view fhevm-tevm-mocks version || true
