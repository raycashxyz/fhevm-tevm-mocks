name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're solving and how fhevm-tevm-mocks could help.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this address?
      placeholder: "When I … I have to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like fhevm-tevm-mocks to behave?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime adapter
        - Mock coprocessor behavior
        - viem / tevm compatibility
        - Testing
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
          required: false
